{% extends "base.html" %}
{% block title %}{{ 'Novo sub-setor' if is_new else 'Editar sub-setor' }} — {{ SETTINGS.company_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1 class="mb-0">{{ 'Novo sub-setor' if is_new else 'Editar sub-setor' }}</h1></div>
  <a href="{{ url_for('access.subsectors') }}" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Voltar</a>
</div>

<div class="card mb-2">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="name">Nome *</label>
        <input type="text" id="name" name="name" class="form-control" required value="{{ sub.name or '' }}"
               placeholder="Ex.: Service Desk">
      </div>
      <div class="form-group">
        <label class="form-label" for="slug">Slug</label>
        <input type="text" id="slug" name="slug" class="form-control" value="{{ sub.slug or '' }}"
               placeholder="gerado do nome se vazio">
      </div>
      <div class="form-group">
        <label class="form-label" for="icon">Ícone (Bootstrap Icons)</label>
        <input type="text" id="icon" name="icon" class="form-control" value="{{ sub.icon or '' }}"
               placeholder="Ex.: bi-headset">
      </div>
    </div>
    <div class="form-group mb-0">
      <label class="form-label" for="description">Descrição</label>
      <input type="text" id="description" name="description" class="form-control" value="{{ sub.description or '' }}">
    </div>
    <button type="submit" class="btn btn-primary mt-2"><i class="bi bi-check-lg"></i> Salvar</button>
  </form>
</div>
{% endblock %}
