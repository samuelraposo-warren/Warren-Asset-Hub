<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Inventário de TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand"><i class="bi bi-hdd-stack"></i> Inventário de TI</div>
      <p class="text-muted text-center mb-2">Acesse sua conta</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            <span>{{ message }}</span>
            <button type="button" class="btn-close" onclick="this.parentElement.remove()">&times;</button>
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" name="email"
                 value="{{ email or '' }}" required autofocus>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="remember" name="remember">
          <label class="form-label mb-0" for="remember">Manter conectado</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 justify-between" style="justify-content:center">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
